name: Release & Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 2.0.0, 2.1.0, 2.0.1)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must be in semver format (e.g. 2.0.0)"
            exit 1
          fi

      - name: Check tag doesn't already exist
        run: |
          if git tag -l "v${{ inputs.version }}" | grep -q .; then
            echo "Error: Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Update package.json version
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version

      - name: Generate changelog
        id: changelog
        run: |
          # Find the previous release tag
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          VERSION="v${{ inputs.version }}"

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
            echo "No previous tag found — including all commits."
          else
            RANGE="${PREV_TAG}..HEAD"
            echo "Generating changelog from ${PREV_TAG} to HEAD"
          fi

          # Categorize commits by conventional commit prefix
          {
            echo "## What's Changed"
            echo ""

            # Features
            FEATS=$(git log "$RANGE" --pretty=format:"%s" --grep="^feat" 2>/dev/null | sed 's/^feat[:(]//' | sed 's/^[[:space:]]*/- /')
            if [ -n "$FEATS" ]; then
              echo "### Features"
              echo "$FEATS"
              echo ""
            fi

            # Fixes
            FIXES=$(git log "$RANGE" --pretty=format:"%s" --grep="^fix" 2>/dev/null | sed 's/^fix[:(]//' | sed 's/^[[:space:]]*/- /')
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            # Everything else (excluding chore/ci/docs and merge commits)
            OTHER=$(git log "$RANGE" --pretty=format:"%s" --invert-grep --grep="^feat" --grep="^fix" --grep="^chore" --grep="^ci" --grep="^docs" --grep="^Merge" 2>/dev/null | sed 's/^/- /')
            if [ -n "$OTHER" ]; then
              echo "### Other Changes"
              echo "$OTHER"
              echo ""
            fi

            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1)}...${VERSION}"
          } > release_notes.md

          echo "Release notes:"
          cat release_notes.md

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ inputs.version }}"
          DATE=$(date +%Y-%m-%d)
          NOTES=$(cat release_notes.md)

          # Build new changelog entry
          {
            echo "# Changelog"
            echo ""
            echo "## [${VERSION}] - ${DATE}"
            echo ""
            echo "${NOTES}"
            echo ""
            # Append everything after the first "# Changelog" header from existing file
            if [ -f CHANGELOG.md ]; then
              tail -n +2 CHANGELOG.md
            fi
          } > CHANGELOG.tmp.md
          mv CHANGELOG.tmp.md CHANGELOG.md

      - name: Commit version bump and changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore: release v${{ inputs.version }}"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body_path: release_notes.md
          generate_release_notes: false

      # ---------- Deploy to Production ----------

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Sync song data from S3
        run: |
          mkdir -p public/files/mass
          aws s3 sync s3://${{ vars.S3_BUCKET }}/files/ public/files/
        env:
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install dependencies
        run: npm install

      - name: Run build
        run: npm run build

      - name: Setup terraform
        uses: hashicorp/setup-terraform@v3

      - name: Initialize Terraform
        id: init
        working-directory: ./infra
        run: |
          terraform init -backend-config=aws.conf

      - name: Terraform Validate
        id: validate
        working-directory: ./infra
        run: terraform validate -no-color

      - name: Terraform Apply
        id: apply
        working-directory: ./infra
        run: |
          terraform apply --auto-approve
          DISTRIBUTION_ID=$(cat distribution_id.txt)
          echo "distribution_id=$DISTRIBUTION_ID" >> $GITHUB_OUTPUT
        env:
          TF_VAR_AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          TF_VAR_AWS_USER: ${{ vars.AWS_USER }}
          TF_VAR_SSL_CERT_ARN: ${{ vars.SSL_CERT_ARN }}
          TF_VAR_DOMAIN: ${{ vars.DOMAIN }}
          TF_VAR_S3_BUCKET: ${{ vars.S3_BUCKET }}
          TF_VAR_REGION: ${{ vars.AWS_REGION }}
          TF_VAR_API_DOMAIN: ${{ vars.API_DOMAIN }}

      - name: Create version file
        run: |
          echo "v${{ inputs.version }}" > ./dist/build_version.txt

      - name: Upload to S3
        run: |
          aws s3 sync ./dist s3://${{ vars.S3_BUCKET }}
        env:
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ env.DISTRIBUTION_ID }} --paths "/index.html" "/*.js" "/*.css"
        env:
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
          DISTRIBUTION_ID: ${{ steps.apply.outputs.distribution_id }}
