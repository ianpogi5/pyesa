name: Generate Sets Manifest

on:
  push:
    branches: [main]
    paths:
      - "public/files/mass/**"

jobs:
  generate-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate sets.json manifest
        run: node scripts/generate-manifest.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/files/sets.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push manifest
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/files/sets.json
          git commit -m "chore: auto-generate sets.json manifest"
          git push
